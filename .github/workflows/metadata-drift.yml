name: Metadata Drift Check

on:
  schedule:
    # Every Monday at 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch: {}

jobs:
  drift:
    runs-on: ubuntu-latest
    name: Detect generated metadata drift

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Regenerate metadata
        run: npm run codegen

      - name: Check for drift
        run: |
          git diff --exit-code nodes/Weclapp/generated/ || {
            echo ""
            echo "❌ Generated metadata has drifted from the committed files."
            echo "   Run 'npm run codegen' locally and commit the updated files."
            exit 1
          }
